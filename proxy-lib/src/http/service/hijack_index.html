<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Aikido Endpoint</title>
        <style>
            html,
            body {
                height: 100%;
            }
            body {
                margin: 0;
                font:
                    16px/1.45 system-ui,
                    -apple-system,
                    Segoe UI,
                    Roboto,
                    Helvetica,
                    Arial;
                background:
                    radial-gradient(
                        900px 500px at 50% 0,
                        rgba(120, 110, 255, 0.25),
                        transparent 60%
                    ),
                    #05061c;
                color: #f4f5ff;
                display: grid;
                place-items: center;
            }
            main {
                text-align: center;
                padding: 24px;
                display: flex;
                flex-direction: column;
                align-items: center;
                max-width: 860px;
            }
            h1 {
                margin: 0;
                font-weight: 800;
                letter-spacing: -0.03em;
                font-size: clamp(40px, 6vw, 72px);
                line-height: 1.05;
            }
            p {
                margin: 16px auto 0;
                max-width: 46ch;
                color: rgba(255, 255, 255, 0.7);
            }
            a {
                display: inline-block;
                margin-top: 28px;
                padding: 12px 20px;
                border-radius: 999px;
                background: #6f6cff;
                color: #fff;
                text-decoration: none;
                font-weight: 700;
            }
            a:hover {
                filter: brightness(1.05);
            }
            .meta {
                margin-top: 10px;
                color: rgba(255, 255, 255, 0.55);
                font-size: 18px;
            }
            .ok {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin: 22px auto 0;
                padding: 10px 18px;
                border-radius: 999px;
                background: rgba(111, 108, 255, 0.18);
                border: 1px solid rgba(111, 108, 255, 0.55);
                color: #f4f5ff;
                font-weight: 800;
                font-size: 28px;
                line-height: 1;
            }
            .details {
                margin: 18px auto 0;
                width: min(760px, 92vw);
                text-align: center;
                padding: 24px 20px;
                border-radius: 18px;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid rgba(255, 255, 255, 0.1);
            }
            @media (max-width: 520px) {
                .ok {
                    font-size: 22px;
                }
                .meta {
                    font-size: 16px;
                }
            }
        </style>
    </head>
    <body>
        <main>
            <h1>Aikido Endpoint</h1>

            <p class="meta">
                Domain hijacked by the transparent proxy runtime.
            </p>

            <p class="ok">Endpoint Protection Active</p>

            <div class="details">
                <p>Your proxy is active. This endpoint is secured.</p>
                <p>Install the proxy root certificate to trust MITM traffic:</p>
                <p>
                    <a href="/data/root.ca.pem">Download Root CA PEM</a>
                </p>
            </div>
        </main>
    </body>
</html>
