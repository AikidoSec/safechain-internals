[profile.default]
failure-output = "immediate-final"
final-status-level = "slow"
slow-timeout = { period = "60s", terminate-after = 2 }

[profile.ci]
fail-fast = false
failure-output = "immediate-final"
final-status-level = "slow"
retries = 1
slow-timeout = { period = "60s", terminate-after = 2 }

[[profile.ci.overrides]]
filter = "package(safechain-l7-proxy) and test(/^test::e2e::/)"
test-group = "safechain-l7-e2e"
retries = 0
slow-timeout = { period = "90s", terminate-after = 2 }

[test-groups]
safechain-l7-e2e = { max-threads = 2 }
