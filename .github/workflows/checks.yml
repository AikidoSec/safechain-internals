name: CI Checks

on:
  push:
    branches:
      - main
  pull_request: {}

concurrency:
  group: checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  proxy-checks:
    strategy:
      matrix:
        include:
          - runner: macos-15
          - runner: macos-15-intel
          - runner: windows-latest
          # NOTE: windows-11-arm is not YET supported in private Github Action runners
          # - runner: windows-11-arm
          - runner: ubuntu-latest
          - runner: ubuntu-24.04-arm

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          components: clippy, rustfmt
      - name: Install Visual Studio 2022 Build Tools (C++)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          # Suppresses the line-by-line download progress bar (animated, ugly in CI logs).
          $ProgressPreference = "SilentlyContinue"
          $installerUrl = "https://aka.ms/vs/17/release/vs_buildtools.exe"
          $installerPath = Join-Path $env:RUNNER_TEMP "vs_buildtools.exe"
          Write-Host "Downloading VS 2022 Build Tools installer..."
          Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
          Write-Host "Running VS 2022 Build Tools installer (quiet)..."
          $proc = Start-Process -FilePath $installerPath -Wait -PassThru -ArgumentList @(
            '--quiet', '--wait', '--norestart', '--nocache',
            '--add', 'Microsoft.VisualStudio.Workload.VCTools',
            '--includeRecommended'
          )
          # 0 = success, 3010 = success but reboot pending; both are fine for our use.
          if ($proc.ExitCode -ne 0 -and $proc.ExitCode -ne 3010) {
            throw "VS 2022 Build Tools installer exited with code $($proc.ExitCode)"
          }
          Write-Host "VS 2022 Build Tools installed."
      - name: Install Windows SDK + WDK
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          winget install --source winget --exact --id Microsoft.WindowsSDK.10.0.26100 --accept-package-agreements --accept-source-agreements --disable-interactivity
          winget install --source winget --exact --id Microsoft.WindowsWDK.10.0.26100 --accept-package-agreements --accept-source-agreements --disable-interactivity
      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4.0.0
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          env-vars: "RUST_TOOLCHAIN=stable"
      - run: |
          just rust-qa-full

  proxy-build-check-musl:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            toolchain: stable
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            toolchain: stable
            target: aarch64-unknown-linux-musl

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: ${{ matrix.target }}
      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.1
      - name: Install cargo-zigbuild
        run: cargo install --version 0.21.3 cargo-zigbuild --locked
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          env-vars: "RUST_TOOLCHAIN=stable"
          prefix-key: "musl-zig-0.15.1-build-0.21.3"
      - name: musl build check (l7-proxy)
        run: |
          cargo zigbuild -p safechain-l7-proxy --target ${{ matrix.target }} --all-features
        env:
          AWS_LC_SYS_CMAKE_BUILDER: "0"
      - name: musl build check (l4-proxy)
        run: |
          cargo zigbuild -p safechain-l4-proxy --target ${{ matrix.target }} --all-features
        env:
          AWS_LC_SYS_CMAKE_BUILDER: "0"

  proxy-fuzz:
    runs-on: ubuntu-latest

    env:
      CARGO_FUZZ_VERSION: 0.13.1
      FUZZ_TIME: 60

    strategy:
      matrix:
        include:
          - fuzz_target: parse_pragmatic_semver_version

    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
      - uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: nightly
      - uses: actions/cache@v5
        with:
          path: ${{ runner.tool_cache }}/cargo-fuzz
          key: cargo-fuzz-bin-${{ env.CARGO_FUZZ_VERSION }}
      - run: echo "${{ runner.tool_cache }}/cargo-fuzz/bin" >> $GITHUB_PATH
      - run: cargo +stable install --root "${{ runner.tool_cache }}/cargo-fuzz" --version ${{ env.CARGO_FUZZ_VERSION }} cargo-fuzz --locked
      - run: CARGO_PROFILE_RELEASE_LTO=false cargo fuzz build --fuzz-dir ./proxy-fuzz ${{ matrix.fuzz_target }}
      - run: CARGO_PROFILE_RELEASE_LTO=false cargo fuzz run --fuzz-dir ./proxy-fuzz ${{ matrix.fuzz_target }} -- -max_total_time=${{ env.FUZZ_TIME }}
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: fuzzing-artifacts-${{ matrix.fuzz_target }}-${{ github.sha }}
          path: fuzz/artifacts
