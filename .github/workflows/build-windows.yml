name: Build Windows

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        required: true
        type: string

concurrency:
  group: build-windows-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-windows-ultimate:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync versions
        id: sync
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            bash scripts/sync-versions.sh --version "$VERSION"
          else
            bash scripts/sync-versions.sh --dev
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Set up Wails (v3)
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.72
          wails3 doctor  # Verify installation

      - name: Run tests
        run: make test
        shell: bash

      - name: Build Windows binaries
        run: make build-windows-amd64
        shell: bash

      - name: Rename binary for artifact
        run: |
          mv bin/endpoint-protection-windows-amd64.exe bin/EndpointProtection.exe
          mv bin/endpoint-protection-ui-windows-amd64.exe bin/EndpointProtectionUI.exe
        shell: bash

      - name: Upload Windows ultimate artifact
        uses: actions/upload-artifact@v4
        with:
          name: EndpointProtection.exe
          path: bin/EndpointProtection.exe

      - name: Upload Windows agent UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: EndpointProtectionUI.exe
          path: bin/EndpointProtectionUI.exe

  build-windows-proxy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync versions
        id: sync
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            bash scripts/sync-versions.sh --version "$VERSION"
          else
            bash scripts/sync-versions.sh --dev
          fi

      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          env-vars: "RUST_TOOLCHAIN=stable"

      - name: cargo check
        run: cargo check -p safechain-l7-proxy --target x86_64-pc-windows-msvc

      - name: clippy
        run: cargo clippy -p safechain-l7-proxy --target x86_64-pc-windows-msvc

      - name: rustfmt
        run: cargo fmt --check

      - name: Build proxy binary
        run: cargo build --release -p safechain-l7-proxy --target x86_64-pc-windows-msvc

      - name: Copy proxy binary
        run: |
          Copy-Item -Path "target\x86_64-pc-windows-msvc\release\safechain-l7-proxy.exe" -Destination "SafeChainL7Proxy.exe" -Force
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SafeChainL7Proxy.exe
          path: SafeChainL7Proxy.exe

  build-windows-l4-proxy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync versions
        id: sync
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            bash scripts/sync-versions.sh --version "$VERSION"
          else
            bash scripts/sync-versions.sh --dev
          fi

      - uses: ilammy/setup-nasm@72793074d3c8cdda771dba85f6deafe00623038b

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      - name: Install Windows SDK + WDK
        shell: powershell
        run: |
          winget install --source winget --exact --id Microsoft.WindowsSDK.10.0.26100 --accept-package-agreements --accept-source-agreements --disable-interactivity
          winget install --source winget --exact --id Microsoft.WindowsWDK.10.0.26100 --accept-package-agreements --accept-source-agreements --disable-interactivity

      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          env-vars: "RUST_TOOLCHAIN=stable"

      - name: Build l4-proxy binary
        run: cargo build --release -p safechain-l4-proxy --target x86_64-pc-windows-msvc

      - name: Copy l4-proxy binary
        run: |
          Copy-Item -Path "target\x86_64-pc-windows-msvc\release\safechain-l4-proxy.exe" -Destination "SafeChainL4Proxy.exe" -Force
        shell: pwsh

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SafeChainL4Proxy.exe
          path: SafeChainL4Proxy.exe

  build-msi:
    needs: [build-windows-ultimate, build-windows-proxy, build-windows-l4-proxy]
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync versions
        id: sync
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            bash scripts/sync-versions.sh --version "$VERSION"
          else
            bash scripts/sync-versions.sh --dev
          fi

      - name: Download EndpointProtection artifact
        uses: actions/download-artifact@v4
        with:
          name: EndpointProtection.exe
          path: bin

      - name: Download EndpointProtection UI artifact
        uses: actions/download-artifact@v4
        with:
          name: EndpointProtectionUI.exe
          path: bin

      - name: Download SafeChainL7Proxy artifact
        uses: actions/download-artifact@v4
        with:
          name: SafeChainL7Proxy.exe
          path: bin

      - name: Download SafeChainL4Proxy artifact
        uses: actions/download-artifact@v4
        with:
          name: SafeChainL4Proxy.exe
          path: bin

      - name: Sign binaries and scripts
        run: |
          dotnet tool install --global AzureSignTool --version 6.0.1
          AzureSignTool sign -kvu "${{ secrets.AZURE_KEY_VAULT_URI }}" -kvi "${{ secrets.AZURE_CLIENT_ID }}" -kvt "${{ secrets.AZURE_TENANT_ID }}" -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" -kvc ${{ secrets.AZURE_CERT_NAME }} -tr http://timestamp.globalsign.com/tsa/advanced -v "bin/EndpointProtection.exe"
          AzureSignTool sign -kvu "${{ secrets.AZURE_KEY_VAULT_URI }}" -kvi "${{ secrets.AZURE_CLIENT_ID }}" -kvt "${{ secrets.AZURE_TENANT_ID }}" -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" -kvc ${{ secrets.AZURE_CERT_NAME }} -tr http://timestamp.globalsign.com/tsa/advanced -v "bin/EndpointProtectionUI.exe"
          AzureSignTool sign -kvu "${{ secrets.AZURE_KEY_VAULT_URI }}" -kvi "${{ secrets.AZURE_CLIENT_ID }}" -kvt "${{ secrets.AZURE_TENANT_ID }}" -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" -kvc ${{ secrets.AZURE_CERT_NAME }} -tr http://timestamp.globalsign.com/tsa/advanced -v "bin/SafeChainL7Proxy.exe"
          AzureSignTool sign -kvu "${{ secrets.AZURE_KEY_VAULT_URI }}" -kvi "${{ secrets.AZURE_CLIENT_ID }}" -kvt "${{ secrets.AZURE_TENANT_ID }}" -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" -kvc ${{ secrets.AZURE_CERT_NAME }} -tr http://timestamp.globalsign.com/tsa/advanced -v "bin/SafeChainL4Proxy.exe"
          AzureSignTool sign -kvu "${{ secrets.AZURE_KEY_VAULT_URI }}" -kvi "${{ secrets.AZURE_CLIENT_ID }}" -kvt "${{ secrets.AZURE_TENANT_ID }}" -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" -kvc ${{ secrets.AZURE_CERT_NAME }} -tr http://timestamp.globalsign.com/tsa/advanced -v "packaging/windows/scripts/StoreToken.ps1"
        shell: bash

      - name: Install WiX Toolset and extensions
        run: |
          dotnet tool install -g wix --version 6.0.2
          wix extension add WixToolset.UI.wixext/6.0.2
          wix extension add WixToolset.Util.wixext/6.0.2

      - name: Build and sign MSI installer
        run: |
          .\packaging\windows\build-msi.ps1 -Version "${{ steps.sync.outputs.version }}" -BinDir ".\bin" -OutputDir "."
          AzureSignTool sign -kvu "${{ secrets.AZURE_KEY_VAULT_URI }}" -kvi "${{ secrets.AZURE_CLIENT_ID }}" -kvt "${{ secrets.AZURE_TENANT_ID }}" -kvs "${{ secrets.AZURE_CLIENT_SECRET }}" -kvc ${{ secrets.AZURE_CERT_NAME }} -tr http://timestamp.globalsign.com/tsa/advanced -v "EndpointProtection.msi"
        shell: pwsh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: EndpointProtection.msi
          path: EndpointProtection.msi
