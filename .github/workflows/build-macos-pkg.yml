name: Build macOS Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        required: true
        type: string

concurrency:
  group: build-macos-pkg-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-unix:
    uses: ./.github/workflows/build-unix.yml
    with:
      version: ${{ inputs.version || 'dev' }}

  build-pkg:
    needs: build-unix
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download agent artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-ultimate-darwin-amd64
          path: bin/amd64

      - name: Download agent artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-ultimate-darwin-arm64
          path: bin/arm64

      - name: Download agent ui app bundle artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-ultimate-ui-darwin-amd64.app
          path: bin/amd64-ui-app

      - name: Download agent ui app bundle artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-ultimate-ui-darwin-arm64.app
          path: bin/arm64-ui-app

      - name: Restore .app bundle layout
        run: |
          mkdir -p "bin/amd64/safechain-ultimate-ui-darwin-amd64.app"
          mv bin/amd64-ui-app/* "bin/amd64/safechain-ultimate-ui-darwin-amd64.app/"
          rm -rf bin/amd64-ui-app
          mkdir -p "bin/arm64/safechain-ultimate-ui-darwin-arm64.app"
          mv bin/arm64-ui-app/* "bin/arm64/safechain-ultimate-ui-darwin-arm64.app/"
          rm -rf bin/arm64-ui-app

      - name: Download proxy artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-l7-proxy-darwin-amd64
          path: bin/amd64

      - name: Download proxy artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-l7-proxy-darwin-arm64
          path: bin/arm64

      - name: Create universal binaries
        run: |
          lipo -create \
            bin/amd64/safechain-ultimate-darwin-amd64 \
            bin/arm64/safechain-ultimate-darwin-arm64 \
            -output bin/safechain-ultimate-darwin-universal

          APP_BINARY_NAME="safechain-ultimate-ui"
          cp -R "bin/amd64/safechain-ultimate-ui-darwin-amd64.app" "bin/safechain-ultimate-ui-darwin-universal.app"
          lipo -create \
            "bin/amd64/safechain-ultimate-ui-darwin-amd64.app/Contents/MacOS/$APP_BINARY_NAME" \
            "bin/arm64/safechain-ultimate-ui-darwin-arm64.app/Contents/MacOS/$APP_BINARY_NAME" \
            -output "bin/safechain-ultimate-ui-darwin-universal.app/Contents/MacOS/$APP_BINARY_NAME"

          lipo -create \
            bin/amd64/safechain-l7-proxy-darwin-amd64 \
            bin/arm64/safechain-l7-proxy-darwin-arm64 \
            -output bin/safechain-l7-proxy-darwin-universal

          echo "Universal binaries created:"
          ls -lh bin/safechain-ultimate-darwin-universal
          ls -lhR bin/safechain-ultimate-ui-darwin-universal.app
          ls -lh bin/safechain-l7-proxy-darwin-universal
          lipo -info bin/safechain-ultimate-darwin-universal
          lipo -info "bin/safechain-ultimate-ui-darwin-universal.app/Contents/MacOS/$APP_BINARY_NAME"
          lipo -info bin/safechain-l7-proxy-darwin-universal

      - name: Make scripts executable
        run: chmod +x .github/scripts/macos/**/*.sh

      - name: Import macOS certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE_P12: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_P12 }}
        run: .github/scripts/macos/core/import-certificate.sh

      - name: Sign macOS agent binary
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: .github/scripts/macos/core/sign-binary.sh bin/safechain-ultimate-darwin-universal

      - name: Sign macOS agent ui app bundle
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: .github/scripts/macos/core/sign-binary.sh bin/safechain-ultimate-ui-darwin-universal.app

      - name: Sign macOS proxy binary
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: .github/scripts/macos/core/sign-binary.sh bin/safechain-l7-proxy-darwin-universal

      - name: Build distribution .pkg installer
        run: |
          cd packaging/macos
          ./build-distribution-pkg.sh -v "${{ inputs.version || 'dev' }}" -a "universal" -b "../../bin" -o "../../dist"

      - name: Rename package
        run: |
          mv dist/SafeChainUltimate-${{ inputs.version || 'dev' }}.pkg dist/SafeChainUltimate.pkg

      - name: Create and notarize macOS packages
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          DEV_ID_INSTALLER_SHA: ${{ env.DEV_ID_INSTALLER_SHA }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: .github/scripts/macos/packages/sign-and-notarize-package.sh dist/SafeChainUltimate.pkg

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: SafeChainUltimate.pkg
          path: dist/SafeChainUltimate.pkg
