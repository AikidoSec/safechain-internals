name: Build macOS Package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        required: true
        type: string

concurrency:
  group: build-macos-pkg-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-unix:
    uses: ./.github/workflows/build-unix.yml
    with:
      version: ${{ inputs.version || 'dev' }}

  build-l4-proxy-macos-app:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          env-vars: "RUST_TOOLCHAIN=stable"

      - name: Build L4 proxy Rust static library (x86_64)
        run: cargo build --release -p safechain-lib-l4-proxy-macos --target x86_64-apple-darwin

      - name: Build L4 proxy Rust static library (aarch64)
        run: cargo build --release -p safechain-lib-l4-proxy-macos --target aarch64-apple-darwin

      - name: Create universal L4 proxy static library
        run: |
          mkdir -p target/universal
          lipo -create \
            target/x86_64-apple-darwin/release/libsafechain_lib_l4_proxy_macos.a \
            target/aarch64-apple-darwin/release/libsafechain_lib_l4_proxy_macos.a \
            -output target/universal/libsafechain_lib_l4_proxy_macos.a
          lipo -info target/universal/libsafechain_lib_l4_proxy_macos.a

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate L4 proxy Xcode project
        run: |
          cd packaging/macos/xcode/l4-proxy
          xcodegen generate

      - name: Make scripts executable
        run: chmod +x .github/scripts/macos/**/*.sh

      - name: Install App Store Connect API key
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY_BASE64" | base64 -d > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Build L4 proxy macOS app (unsigned)
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_ISSUER_ID: ${{ secrets.APPLE_API_KEY_ISSUER_ID }}
        run: |
          cd packaging/macos/xcode/l4-proxy
          xcodebuild \
            -project AikidoEndpointL4Proxy.xcodeproj \
            -scheme AikidoEndpointL4ProxyHost \
            -configuration Release \
            -derivedDataPath "${{ github.workspace }}/l4-derived-data" \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            -authenticationKeyID "$APPLE_API_KEY_ID" \
            -authenticationKeyIssuerID "$APPLE_API_KEY_ISSUER_ID" \
            ARCHS="x86_64 arm64" \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            CODE_SIGN_INJECT_BASE_ENTITLEMENTS=NO \
            clean build

      - name: Prepare L4 proxy app artifact
        run: |
          ditto "${{ github.workspace }}/l4-derived-data/Build/Products/Release/AikidoEndpointL4ProxyHost.app" \
            AikidoEndpointL4ProxyHost.app

      - name: Upload L4 proxy app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AikidoEndpointL4ProxyHost.app
          path: AikidoEndpointL4ProxyHost.app

  build-pkg:
    needs: [build-unix, build-l4-proxy-macos-app]
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download agent artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: endpoint-protection-darwin-amd64
          path: bin/amd64

      - name: Download agent artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: endpoint-protection-darwin-arm64
          path: bin/arm64

      - name: Download agent ui app bundle artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: endpoint-protection-ui-darwin-amd64.app
          path: bin/amd64-ui-app

      - name: Download agent ui app bundle artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: endpoint-protection-ui-darwin-arm64.app
          path: bin/arm64-ui-app

      - name: Restore .app bundle layout
        run: |
          mkdir -p "bin/amd64/endpoint-protection-ui-darwin-amd64.app"
          mv bin/amd64-ui-app/* "bin/amd64/endpoint-protection-ui-darwin-amd64.app/"
          rm -rf bin/amd64-ui-app
          mkdir -p "bin/arm64/endpoint-protection-ui-darwin-arm64.app"
          mv bin/arm64-ui-app/* "bin/arm64/endpoint-protection-ui-darwin-arm64.app/"
          rm -rf bin/arm64-ui-app

      - name: Download proxy artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-l7-proxy-darwin-amd64
          path: bin/amd64

      - name: Download proxy artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-l7-proxy-darwin-arm64
          path: bin/arm64

      - name: Download l4-proxy artifact (amd64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-l4-proxy-darwin-amd64
          path: bin/amd64

      - name: Download l4-proxy artifact (arm64)
        uses: actions/download-artifact@v4
        with:
          name: safechain-l4-proxy-darwin-arm64
          path: bin/arm64

      - name: Download L4 proxy macOS app artifact
        uses: actions/download-artifact@v4
        with:
          name: AikidoEndpointL4ProxyHost.app
          path: bin/l4-app-download

      - name: Restore L4 proxy app bundle layout
        run: |
          mkdir -p "bin/AikidoEndpointL4ProxyHost.app"
          mv bin/l4-app-download/* "bin/AikidoEndpointL4ProxyHost.app/"
          rm -rf bin/l4-app-download

      - name: Create universal binaries
        run: |
          lipo -create \
            bin/amd64/endpoint-protection-darwin-amd64 \
            bin/arm64/endpoint-protection-darwin-arm64 \
            -output bin/endpoint-protection-darwin-universal

          APP_BINARY_NAME="endpoint-protection-ui"
          cp -R "bin/amd64/endpoint-protection-ui-darwin-amd64.app" "bin/endpoint-protection-ui-darwin-universal.app"
          lipo -create \
            "bin/amd64/endpoint-protection-ui-darwin-amd64.app/Contents/MacOS/$APP_BINARY_NAME" \
            "bin/arm64/endpoint-protection-ui-darwin-arm64.app/Contents/MacOS/$APP_BINARY_NAME" \
            -output "bin/endpoint-protection-ui-darwin-universal.app/Contents/MacOS/$APP_BINARY_NAME"

          lipo -create \
            bin/amd64/safechain-l7-proxy-darwin-amd64 \
            bin/arm64/safechain-l7-proxy-darwin-arm64 \
            -output bin/safechain-l7-proxy-darwin-universal

          lipo -create \
            bin/amd64/safechain-l4-proxy-darwin-amd64 \
            bin/arm64/safechain-l4-proxy-darwin-arm64 \
            -output bin/safechain-l4-proxy-darwin-universal

          echo "Universal binaries created:"
          ls -lh bin/endpoint-protection-darwin-universal
          ls -lhR bin/endpoint-protection-ui-darwin-universal.app
          ls -lh bin/safechain-l7-proxy-darwin-universal
          ls -lh bin/safechain-l4-proxy-darwin-universal
          lipo -info bin/endpoint-protection-darwin-universal
          lipo -info "bin/endpoint-protection-ui-darwin-universal.app/Contents/MacOS/$APP_BINARY_NAME"
          lipo -info bin/safechain-l7-proxy-darwin-universal
          lipo -info bin/safechain-l4-proxy-darwin-universal

      - name: Make scripts executable
        run: chmod +x .github/scripts/macos/**/*.sh

      - name: Import macOS certificate
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_INSTALLER_CERTIFICATE_P12: ${{ secrets.MACOS_INSTALLER_CERTIFICATE_P12 }}
        run: .github/scripts/macos/core/import-certificate.sh

      - name: Sign macOS agent binary
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: .github/scripts/macos/core/sign-binary.sh bin/endpoint-protection-darwin-universal

      - name: Sign macOS agent ui app bundle
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: .github/scripts/macos/core/sign-binary.sh bin/endpoint-protection-ui-darwin-universal.app

      - name: Sign macOS l7-proxy binary
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: .github/scripts/macos/core/sign-binary.sh bin/safechain-l7-proxy-darwin-universal

      - name: Sign macOS l4-proxy binary
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: .github/scripts/macos/core/sign-binary.sh bin/safechain-l4-proxy-darwin-universal

      - name: Sign macOS L4 proxy app bundle
        env:
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          L4_HOST_ENTITLEMENTS: packaging/macos/xcode/l4-proxy/Host/Host.entitlements
          L4_EXTENSION_ENTITLEMENTS: packaging/macos/xcode/l4-proxy/Extension/Extension.entitlements
          L4_HOST_BUNDLE_ID: com.aikido.endpoint.proxy.l4
          L4_EXTENSION_BUNDLE_ID: com.aikido.endpoint.proxy.l4.extension
        run: |
          APPEX="bin/AikidoEndpointL4ProxyHost.app/Contents/PlugIns/AikidoEndpointL4ProxyExtension.appex"
          APP="bin/AikidoEndpointL4ProxyHost.app"
          APP_IDENTIFIER_PREFIX="${APPLE_TEAM_ID}."
          RESOLVED_HOST_ENTITLEMENTS="$(mktemp)"
          RESOLVED_EXTENSION_ENTITLEMENTS="$(mktemp)"

          cleanup() {
            rm -f "$RESOLVED_HOST_ENTITLEMENTS" "$RESOLVED_EXTENSION_ENTITLEMENTS"
          }
          trap cleanup EXIT

          if [ ! -f "$L4_HOST_ENTITLEMENTS" ]; then
            echo "ERROR: Host entitlements file not found: $L4_HOST_ENTITLEMENTS"
            exit 1
          fi

          if [ ! -f "$L4_EXTENSION_ENTITLEMENTS" ]; then
            echo "ERROR: Extension entitlements file not found: $L4_EXTENSION_ENTITLEMENTS"
            exit 1
          fi

          sed \
            -e "s|\$(AppIdentifierPrefix)|$APP_IDENTIFIER_PREFIX|g" \
            -e "s|\$(PRODUCT_BUNDLE_IDENTIFIER)|$L4_HOST_BUNDLE_ID|g" \
            "$L4_HOST_ENTITLEMENTS" > "$RESOLVED_HOST_ENTITLEMENTS"

          sed \
            -e "s|\$(AppIdentifierPrefix)|$APP_IDENTIFIER_PREFIX|g" \
            -e "s|\$(PRODUCT_BUNDLE_IDENTIFIER)|$L4_EXTENSION_BUNDLE_ID|g" \
            "$L4_EXTENSION_ENTITLEMENTS" > "$RESOLVED_EXTENSION_ENTITLEMENTS"

          echo "Resolved host entitlements:"
          cat "$RESOLVED_HOST_ENTITLEMENTS"
          echo "Resolved extension entitlements:"
          cat "$RESOLVED_EXTENSION_ENTITLEMENTS"

          echo "Signing L4 extension with explicit entitlements..."
          codesign --force --sign "$DEV_ID_SHA" --timestamp --options runtime \
            --entitlements "$RESOLVED_EXTENSION_ENTITLEMENTS" \
            --keychain build.keychain "$APPEX"

          echo "Signing L4 host app with explicit entitlements..."
          codesign --force --sign "$DEV_ID_SHA" --timestamp --options runtime \
            --entitlements "$RESOLVED_HOST_ENTITLEMENTS" \
            --keychain build.keychain "$APP"

          echo "Verifying signatures..."
          codesign --verify --strict --verbose=4 "$APPEX"
          codesign --verify --strict --verbose=4 "$APP"

          echo "Dumping effective entitlements..."
          codesign -d --entitlements :- "$APPEX"
          codesign -d --entitlements :- "$APP"

          echo "Verifying entitlements include networkextension..."
          codesign -d --entitlements :- "$APPEX" 2>/dev/null | grep -q "networkextension"
          codesign -d --entitlements :- "$APP" 2>/dev/null | grep -q "networkextension"

          echo "Verifying team identifier..."
          TEAM=$(codesign -dvv "$APP" 2>&1 | awk -F= '/TeamIdentifier/ {print $2}')
          if [ "$TEAM" != "$APPLE_TEAM_ID" ]; then
            echo "ERROR: Team mismatch: $TEAM != $APPLE_TEAM_ID"
            exit 1
          fi

          echo "Assessing app..."
          if ! spctl --assess --type execute -vv "$APP"; then
            echo "WARNING: spctl assessment failed"
          fi

          echo "L4 proxy app bundle signed successfully"

      - name: Build distribution .pkg installer
        run: |
          cd packaging/macos
          ./build-distribution-pkg.sh -v "${{ inputs.version || 'dev' }}" -a "universal" -b "../../bin" -o "../../dist"

      - name: Rename package
        run: |
          mv dist/EndpointProtection-${{ inputs.version || 'dev' }}.pkg dist/EndpointProtection.pkg

      - name: Create and notarize macOS packages
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          DEV_ID_SHA: ${{ env.DEV_ID_SHA }}
          DEV_ID_INSTALLER_SHA: ${{ env.DEV_ID_INSTALLER_SHA }}
          KEYCHAIN_PATH: ${{ env.KEYCHAIN_PATH }}
          VERSION: ${{ inputs.version }}
          BUILD_NUMBER: ${{ github.run_number }}
        run: .github/scripts/macos/packages/sign-and-notarize-package.sh dist/EndpointProtection.pkg

      - name: Upload .pkg artifact
        uses: actions/upload-artifact@v4
        with:
          name: EndpointProtection.pkg
          path: dist/EndpointProtection.pkg
