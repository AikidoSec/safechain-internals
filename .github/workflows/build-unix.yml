name: Build Unix

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_call:
    inputs:
      version:
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-unix-agent:
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: macos-14
          - arch: arm64
            runner: macos-14

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync versions
        id: sync
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            bash scripts/sync-versions.sh --version "$VERSION"
          else
            bash scripts/sync-versions.sh --dev
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      
      - name: Set up Wails (v3)
        run: |
          go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.72
          wails3 doctor  # Verify installation

      - name: Run tests
        run: make test

      - name: Build binaries for darwin/${{ matrix.arch }}
        run: make build-darwin-${{ matrix.arch }} VERSION="${{ steps.sync.outputs.version }}"

      - name: Prepare artifacts
        run: |
          mv bin/endpoint-protection-darwin-${{ matrix.arch }} endpoint-protection-darwin-${{ matrix.arch }}
          mv bin/endpoint-protection-ui-darwin-${{ matrix.arch }}.app endpoint-protection-ui-darwin-${{ matrix.arch }}.app

      - name: Upload endpoint-protection artifact
        uses: actions/upload-artifact@v4
        with:
          name: endpoint-protection-darwin-${{ matrix.arch }}
          path: |
            endpoint-protection-darwin-${{ matrix.arch }}
      - name: Upload endpoint-protection-ui app bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: endpoint-protection-ui-darwin-${{ matrix.arch }}.app
          path: |
            endpoint-protection-ui-darwin-${{ matrix.arch }}.app

  build-unix-proxy:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            rust_cache_prefix: ""
          - arch: amd64
            target: x86_64-apple-darwin
            runner: macos-14
            os: darwin
            rust_cache_prefix: ""
          - arch: amd64
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            os: linux
            rust_cache_prefix: "musl-zig-0.15.1-build-0.21.3"
          - arch: arm64
            target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            os: linux
            rust_cache_prefix: "musl-zig-0.15.1-build-0.21.3"

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync versions
        id: sync
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            bash scripts/sync-versions.sh --version "$VERSION"
          else
            bash scripts/sync-versions.sh --dev
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: contains(matrix.target, 'unknown-linux-musl')
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.1

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'unknown-linux-musl')
        run: cargo install --version 0.21.3 cargo-zigbuild --locked

      - name: Rust Cache
        if: contains(matrix.target, 'unknown-linux-musl')
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          env-vars: "RUST_TOOLCHAIN=stable"
          prefix-key: matrix.rust_cache_prefix

      - name: Build proxy binary for linux musl
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo zigbuild --release -p safechain-l7-proxy --target "${{ matrix.target }}"
        env:
          AWS_LC_SYS_CMAKE_BUILDER: "0"

      - name: Build proxy binary for ${{ matrix.os }}/${{ matrix.arch }}
        if: ${{ !(contains(matrix.target, 'unknown-linux-musl')) }}
        run: cargo build --release -p safechain-l7-proxy --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          mv target/${{ matrix.target }}/release/safechain-l7-proxy safechain-l7-proxy-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safechain-l7-proxy-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            safechain-l7-proxy-${{ matrix.os }}-${{ matrix.arch }}

  build-unix-l4-proxy:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            target: aarch64-apple-darwin
            runner: macos-14
            os: darwin
            rust_cache_prefix: ""
          - arch: amd64
            target: x86_64-apple-darwin
            runner: macos-14
            os: darwin
            rust_cache_prefix: ""
          - arch: amd64
            target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            os: linux
            rust_cache_prefix: "musl-zig-0.15.1-build-0.21.3"
          - arch: arm64
            target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            os: linux
            rust_cache_prefix: "musl-zig-0.15.1-build-0.21.3"

    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Sync versions
        id: sync
        env:
          VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$VERSION" ]; then
            bash scripts/sync-versions.sh --version "$VERSION"
          else
            bash scripts/sync-versions.sh --dev
          fi

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@f7ccc83f9ed1e5b9c81d8a67d7ad1a747e22a561
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Zig
        if: contains(matrix.target, 'unknown-linux-musl')
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29
        with:
          version: 0.15.1

      - name: Install cargo-zigbuild
        if: contains(matrix.target, 'unknown-linux-musl')
        run: cargo install --version 0.21.3 cargo-zigbuild --locked

      - name: Rust Cache
        if: contains(matrix.target, 'unknown-linux-musl')
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          env-vars: "RUST_TOOLCHAIN=stable"
          prefix-key: matrix.rust_cache_prefix

      - name: Build proxy binary for linux musl
        if: ${{ contains(matrix.target, 'unknown-linux-musl') }}
        run: cargo zigbuild --release -p safechain-l4-proxy --target "${{ matrix.target }}"
        env:
          AWS_LC_SYS_CMAKE_BUILDER: "0"

      - name: Build proxy binary for ${{ matrix.os }}/${{ matrix.arch }}
        if: ${{ !(contains(matrix.target, 'unknown-linux-musl')) }}
        run: cargo build --release -p safechain-l4-proxy --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          mv target/${{ matrix.target }}/release/safechain-l4-proxy safechain-l4-proxy-${{ matrix.os }}-${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: safechain-l4-proxy-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            safechain-l4-proxy-${{ matrix.os }}-${{ matrix.arch }}
