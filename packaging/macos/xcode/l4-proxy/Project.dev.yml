name: AikidoEndpointL4Proxy
options:
  bundleIdPrefix: 7VPF8GD6J4
  deploymentTarget:
    macOS: "13.0"

packages:
  RamaAppleNetworkExtension:
    url: https://github.com/plabayo/rama.git
    revision: 4e1041cc212ea5e4de27a64da4246b7ec731370b

targets:
  AikidoEndpointL4ProxyHost:
    type: application
    platform: macOS
    sources:
      - path: Host
    dependencies:
      - target: AikidoEndpointL4ProxyExtension
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aikido.endpoint.proxy.l4
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Host/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Host/Host.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "7VPF8GD6J4"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: ""
        AIKIDO_L4_EXTENSION_BUNDLE_ID: com.aikido.endpoint.proxy.l4.extension
        AIKIDO_L4_SHARED_ACCESS_GROUP_BUNDLE_ID: com.aikido.endpoint.proxy.l4.extension
        AIKIDO_L4_LOG_SUBSYSTEM: com.aikido.endpoint.proxy.l4
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  AikidoEndpointL4ProxyExtension:
    type: system-extension
    platform: macOS
    sources:
      - path: Extension
    dependencies:
      - package: RamaAppleNetworkExtension
        product: RamaAppleNetworkExtension
    postBuildScripts:
      - name: Bump CFBundleVersion
        script: |
          VERSION=$(date +%Y%m%d%H%M%S)
          PLIST="$TARGET_BUILD_DIR/$INFOPLIST_PATH"

          echo "Updating CFBundleVersion in $PLIST to $VERSION"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" "$PLIST"

          echo "Re-signing $CODESIGNING_FOLDER_PATH"
          /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --timestamp=none "$CODESIGNING_FOLDER_PATH"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aikido.endpoint.proxy.l4.extension
        PRODUCT_NAME: com.aikido.endpoint.proxy.l4.extension
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Extension/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Extension/Extension.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        DEVELOPMENT_TEAM: "7VPF8GD6J4"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
        NE_ENTITLEMENT_SUFFIX: ""
        AIKIDO_L4_SHARED_ACCESS_GROUP_BUNDLE_ID: com.aikido.endpoint.proxy.l4.extension
        AIKIDO_L4_LOG_SUBSYSTEM: com.aikido.endpoint.proxy.l4
        ENABLE_DEBUG_DYLIB: NO
        OTHER_LDFLAGS:
          - "$(SRCROOT)/../../../../target/universal/libsafechain_lib_l4_proxy_macos.a"
          - "-framework"
          - "NetworkExtension"
          - "-framework"
          - "SystemConfiguration"
          - "-lz"
