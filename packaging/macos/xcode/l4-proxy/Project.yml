name: AikidoEndpointL4Proxy
options:
  bundleIdPrefix: 7VPF8GD6J4
  deploymentTarget:
    macOS: "13.0"

packages:
  RamaAppleNetworkExtension:
    url: https://github.com/plabayo/rama.git
    revision: 4e1041cc212ea5e4de27a64da4246b7ec731370b

targets:
  AikidoEndpointL4ProxyHost:
    type: application
    platform: macOS
    sources:
      - path: Host
    dependencies:
      - target: AikidoEndpointL4ProxyExtension
        embed: true
        codeSign: true
    postBuildScripts:
      - name: Sign Embedded Extension
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          if [ "${CODE_SIGNING_ALLOWED:-YES}" != "YES" ]; then
            exit 0
          fi
          APP="$TARGET_BUILD_DIR/$FULL_PRODUCT_NAME/Contents/PlugIns/AikidoEndpointL4ProxyExtension.appex"
          if [ -d "$APP" ]; then
            /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" --preserve-metadata=entitlements --timestamp "$APP"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aikido.endpoint.proxy.l4
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Host/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Host/Host.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application: Aikido Security (7VPF8GD6J4)"
        DEVELOPMENT_TEAM: "7VPF8GD6J4"
        PROVISIONING_PROFILE_SPECIFIER: "Developer ID L4 Proxy Host"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  AikidoEndpointL4ProxyExtension:
    type: app-extension
    platform: macOS
    sources:
      - path: Extension
    dependencies:
      - package: RamaAppleNetworkExtension
        product: RamaAppleNetworkExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aikido.endpoint.proxy.l4.extension
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: Extension/Info.plist
        MARKETING_VERSION: 0.1
        CODE_SIGN_ENTITLEMENTS: Extension/Extension.entitlements
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Developer ID Application: Aikido Security (7VPF8GD6J4)"
        DEVELOPMENT_TEAM: "7VPF8GD6J4"
        PROVISIONING_PROFILE_SPECIFIER: "Developer ID L4 Proxy Extension"
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        OTHER_CODE_SIGN_FLAGS: "--timestamp"
        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_DEBUG_DYLIB: NO
        OTHER_LDFLAGS:
          - "$(SRCROOT)/../../../../target/universal/libsafechain_lib_l4_proxy_macos.a"
          - "-framework"
          - "NetworkExtension"
          - "-lz"
